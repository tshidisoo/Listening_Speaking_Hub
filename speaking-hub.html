<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speaking Hub · Primary 2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-emoji">🎤</div>
    <h1>Speaking Hub</h1>
    <p class="subtitle">Primary 2 · 8-Day Speaking Marathon</p>
  </header>

  <section id="selector">
    <p class="selector-intro">Who is speaking today? 👇</p>

    <div class="student-cards four-up">

      <button class="student-card" data-student="yahya" data-password="yahya2026" data-greeting="Hello, Yahya!">
        <span class="student-card-emoji">🦁</span>
        <span class="student-card-text">
          <span class="student-card-name">Yahya</span>
          <span class="student-card-sub">Primary 2</span>
        </span>
      </button>

      <button class="student-card" data-student="Mohammed" data-password="mohammed2026" data-greeting="Hello, Mohammed!">
        <span class="student-card-emoji">⚽</span>
        <span class="student-card-text">
          <span class="student-card-name">Mohammed</span>
          <span class="student-card-sub">Primary 2</span>
        </span>
      </button>

      <button class="student-card" data-student="Mehmet" data-password="mehmet2026" data-greeting="Hello, Mehmet!">
        <span class="student-card-emoji">🚀</span>
        <span class="student-card-text">
          <span class="student-card-name">Mehmet</span>
          <span class="student-card-sub">Primary 2</span>
        </span>
      </button>

      <button class="student-card" data-student="Feysal" data-password="feysal2026" data-greeting="Hello, Feysal!">
        <span class="student-card-emoji">🎯</span>
        <span class="student-card-text">
          <span class="student-card-name">Feysal</span>
          <span class="student-card-sub">Primary 2</span>
        </span>
      </button>

    </div>

    <div id="password-box" style="display:none">
      <p id="password-prompt" class="password-prompt"></p>
      <div class="password-input-row">
        <input id="password-field" type="password" autocomplete="off"
               placeholder="Enter password…" />
        <button id="enter-btn" aria-label="Go">→</button>
      </div>
      <p id="password-error" class="password-error" style="display:none">
        ❌ Wrong password. Try again!
      </p>
    </div>
  </section>

  <footer>
    <p>Made with 💪 for Yahya, Mohammed, Mehmet &amp; Feysal · Speak loud and proud!</p>
  </footer>

  <script>
    let selectedStudent = null;
    let selectedPassword = null;

    const passwordBox    = document.getElementById("password-box");
    const passwordField  = document.getElementById("password-field");
    const passwordError  = document.getElementById("password-error");
    const passwordPrompt = document.getElementById("password-prompt");
    const enterBtn       = document.getElementById("enter-btn");

    document.querySelectorAll(".student-card").forEach(card => {
      card.addEventListener("click", () => {
        document.querySelectorAll(".student-card").forEach(c => c.classList.remove("selected"));
        card.classList.add("selected");

        selectedStudent  = card.dataset.student;
        selectedPassword = card.dataset.password;

        passwordPrompt.textContent = card.dataset.greeting + " Enter your password:";
        passwordError.style.display = "none";
        passwordField.value = "";
        passwordBox.style.display = "block";
        passwordField.focus();
      });
    });

    function tryLogin() {
      if (!selectedStudent) return;
      if (passwordField.value === selectedPassword) {
        sessionStorage.setItem("speakingStudent", selectedStudent);
        window.location.href = "speaking-app.html";
      } else {
        passwordError.style.display = "block";
        passwordField.value = "";
        passwordBox.classList.remove("shake");
        void passwordBox.offsetWidth;
        passwordBox.classList.add("shake");
        passwordBox.addEventListener("animationend", () => {
          passwordBox.classList.remove("shake");
        }, { once: true });
        passwordField.focus();
      }
    }

    enterBtn.addEventListener("click", tryLogin);
    passwordField.addEventListener("keydown", e => {
      if (e.key === "Enter") tryLogin();
    });
  </script>

</body>
</html>
